<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <!-- PNG favicons only. When icon links are declared, browsers use them and
         do NOT auto-probe /favicon.ico, so no legacy .ico is needed. (The prod
         edge/build pipeline was 404-ing the committed favicon.ico while serving
         every sibling PNG; dropping the .ico dependency sidesteps that and is
         the modern default.) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2350" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://jeetagrowth.com/" />
    <meta name="description" content="Jeeta Growth — hepsi bir arada pazarlama ve CRM platformu. Lead'den satışa, kampanyadan otomasyona, gelen kutusundan analitiğe; işletmenin büyümesini tek panelden yönet." />
    <meta property="og:site_name" content="Jeeta Growth" />
    <meta property="og:title" content="Jeeta Growth — Tüm pazarlaman tek panelde" />
    <meta property="og:description" content="Hepsi bir arada pazarlama ve CRM platformu. CRM, omnichannel inbox, kampanya, otomasyon, funnel, sosyal planlayıcı, ses AI ve faturalama — tek yerde." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jeetagrowth.com/" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:image" content="https://jeetagrowth.com/logo.png" />
    <meta property="og:image:alt" content="Jeeta Growth" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jeeta Growth — Tüm pazarlaman tek panelde" />
    <meta name="twitter:description" content="Hepsi bir arada pazarlama ve CRM platformu — CRM, inbox, kampanya, otomasyon, funnel ve daha fazlası tek panelde." />
    <meta name="twitter:image" content="https://jeetagrowth.com/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <title>Jeeta Growth — Hepsi bir arada pazarlama & CRM platformu</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Jeeta Growth",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://jeetagrowth.com/",
        "description": "Hepsi bir arada pazarlama ve CRM platformu — CRM, omnichannel inbox, kampanya, otomasyon, funnel, sosyal planlayıcı ve faturalama tek panelde."
      }
    </script>
    <!-- Pre-paint theme: mirror themeStore/resolveTheme so a persisted dark theme
         paints dark on first frame instead of flashing white (FOUC) before React
         hydrates. ThemeProvider remains the source of truth afterwards. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('kds-theme');
          var pref = raw ? (JSON.parse(raw).state || {}).pref : 'system';
          var dark =
            pref === 'dark' ||
            ((!pref || pref === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* private mode / bad JSON — fall back to the CSS default (light) */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
