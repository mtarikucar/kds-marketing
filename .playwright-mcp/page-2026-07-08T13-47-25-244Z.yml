          - listitem [ref=e990]:
            - paragraph [ref=e991]: Bu servis TCP soketle ya da HTTP GET yöntemi ile kullanabilirsiniz.
          - listitem [ref=e992]:
            - paragraph [ref=e993]: Caller ve called değişkenlerine girilen dış numaraları santralinizden arayarak iki GSM numarası açtığında birbirine bağlar.
          - listitem [ref=e994]:
            - paragraph [ref=e995]: Santralinizde giden çağrı ayarlarınızda santral numaranızın önünde eğer ön ek bilgisi var ise numarayı caller ve called numara bilgilerini ön ek + GSMNO olarak yazmanız gerekmektedir.
          - listitem [ref=e996]:
            - paragraph [ref=e997]: İki dış numara birbirine bağlandığında öncesinde texte yazdığınız metni ses olarak bu numaralara dinletebilirsiniz. caller_text ve called_text parametreleri ile örnek caller (A) ve called (B) dış numaraları arandığı zaman caller_text kısmında yazan text bilgisi robotik olarak caller parametresinde yazan numaraya (A numarasına), called_text parametresinde yazılan text bilgisi ise called parametresinde yer alan numaraya (B numarasına) ses olarak dinletilir.
          - listitem [ref=e998]:
            - paragraph [ref=e999]: İki dış numara birbirine bağlandığında öncesinde Netsantral arayüzden daha öncesinde yüklenmiş ses dosyalarını bu numaralara dinletebilirsiniz. called_record ve caller_record parametrelerinde Netsantral arayüzde yer alan ses dosyası ismini göndermeniz yeterlidir. Bu işlem ile örnek caller (A) ve called (B) dış numaraları arandığı zaman caller_record kısmındaki ses dosyası caller parametresinde yazan numaraya (A numarasına), called_record parametresindeki ses dosyası ise called parametresinde yer alan numaraya (B numarasına) ses olarak dinletilir.
