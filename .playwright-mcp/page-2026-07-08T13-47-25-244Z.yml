pleted\":0, \"holdtime\":2, \"agents\": {\"199\":\"unregister\", \"101\":\"onhook\", \"102\":\"empty\", \"103\":\"ringing\"} } { \"agent\": \"110\", // dahilinin numarası \"status\": \"empty\", //dahilinin çağrı durumu \"membership\": \"static\", //dahilinin kuyruğa eklenme yöntemi, static ise arayüzden, dynamic ise apiden \"paused\": \"false\", // dahili mola durumu \"reason\": \"\" } //dahilinin mola nedeni */"
