          - text: "{ $curl = curl_init($url); curl_setopt($curl, CURLOPT_HEADER, false); curl_setopt($curl, CURLOPT_RETURNTRANSFER, true); curl_setopt($curl, CURLOPT_HTTPHEADER, array(\"Content-type: application/json\")); curl_setopt($curl, CURLOPT_POST, true); curl_setopt($curl, CURLOPT_SSL_VERIFYHOST, 2); curl_setopt($curl, CURLOPT_SSL_VERIFYPEER, 0); curl_setopt($curl, CURLOPT_POSTFIELDS, $content); $json_response = curl_exec($curl); $status = curl_getinfo($curl, CURLINFO_HTTP_CODE); curl_close($curl); return($json_response); } try { $arr_acc = array('username' => '85030XXXXX', 'password' => 'xxxxx', 'command' => 'queuedelnumber', 'tenant' => '85030XXXXX', 'queue' => '85030XXXXX-queue-kuyrukismi' ,'no' => '5xxxxxxxxx', 'penalty' => '1'); $url_acc = \"https://api.netgsm.com.tr/netsantral/queue\"; $content_acc = json_encode($arr_acc); $send_acc = curlitjson($url_acc,$content_acc); $send_acc = json_decode($send_acc); print($send_acc); } catch (Exception $exc) { echo $exc->getMessage(); } /* Servise Gönderilen Inputlar : // Aynı kuyruğa Tek numara ekleme ya da çıkarma {\"username\": \"850346****\",\"password\": \"***\",\"command\": \"queueaddnumber\",\"tenant\": \"850346****\",\"queue\": \"850346****-queue-karsilama\",\"no\": \"505*******\",\"penalty\": \"1\"} {\"username\": \"850346****\",\"password\": \"***\",\"command\": \"queuedelnumber\",\"tenant\": \"850346****\",\"queue\": \"850346****-queue-karsilama\",\"no\": \"312*******\",\"penalty\": \"1\"} // Aynı kuyruktan Tek numara çıkarma ya da ekleme {\"username\": \"850346****\",\"password\": \"***\",\"command\": \"queuedelnumber\",\"tenant\": \"850346****\",\"queue\": \"850346****-queue-karsilama\",\"numbers\": [{\"no\": \"5331******\",\"penalty\": 1},{\"no\":\"5332******\",\"penalty\": 2}]} // Farklı Kuyruklardan numara çıkarma ya da ekleme {\"username\": \"850346****\",\"password\": \"***\",\"command\": \"queuedelnumber\",\"tenant\": \"850346****\",\"queues\": [{\"queue\": \"850346****-queue-karsilama\",\"no\": \"312*******\",\"penalty\": 1},{\"queue\":\"850346****-queue-teknik\",\"no\": \"5333******\",\"penalty\": 1}]} // basarili output : { \"code\": 200, \"message\": \"queuedelnumber islemi yapildi.\" } // basarisiz output : { \"code\": \"30\", \"error\": \"Kullanici bilgisi bulunamadi\" } */"
