        - generic [ref=e3480]: "// WebHook Otomatik Arama Durum Bildiriminde Dönen Output : /* { \"Header\": { \"App\": \"AutomaticCall\" }, \"Body\": { \"JobID\": 1630, \"crm_id\": \"801003678\", \"called\": \"05*********\", \"redirect_menu\": \"****\", \"redirect_type\": \"announcement\", \"trunk\": \"850*******\", \"prefix\": \"NET\", \"callerid\": \"\", \"unique_id\": \"sip3-160277***.****\", \"status\": \"Success\", \"message\": \"Successfully\" } } } */"
        - generic [ref=e3481]:
          - generic [ref=e3482]: POST
          - generic [ref=e3483]: https://api.netgsm.com.tr/autocallservice
        - generic [ref=e3484]:
          - generic [ref=e3485]: function curlitjson($url,$content)
          - text: "{ $curl = curl_init($url); curl_setopt($curl, CURLOPT_HEADER, false); curl_setopt($curl, CURLOPT_RETURNTRANSFER, true); curl_setopt($curl, CURLOPT_HTTPHEADER, array(\"Content-type: application/json\")); curl_setopt($curl, CURLOPT_POST, true); curl_setopt($curl, CURLOPT_SSL_VERIFYHOST, 2); curl_setopt($curl, CURLOPT_SSL_VERIFYPEER, 0); curl_setopt($curl, CURLOPT_POSTFIELDS, $content); $json_response = curl_exec($curl); $status = curl_getinfo($curl, CURLINFO_HTTP_CODE); curl_close($curl); return($json_response); } try { $arr_acc = array( \"header\" => array( \"username\" => \"85030xxxxxxxx\",\"password\" => \"xxxx\"), \"body\" => array( \"event\" => \"reportautocall\", \"list_id\" => \"279\" )); $url_acc = \"https://api.netgsm.com.tr/autocallservice\"; $content_acc = json_encode($arr_acc); $send_acc = curlitjson($url_acc,$content_acc); $send_acc = json_decode($send_acc); print($send_acc); } catch (Exception $exc) { echo $exc->getMessage(); } /* reportautocall işlemi için input : { \"header\": { \"username\": \"8503******\", \"password\": \"***\" }, \"body\": { \"event\": \"reportautocall\", \"list_id\": \"279\", \"data\": { \"status\": \"1\" } } } Servisten Alınan Başarılı Örnek Cevap { \"header\": { \"error\": false, \"code\": 200, \"message\": \"Raporlama basarili.\" }, \"body\": [ { \"numbers_status\": [ { \"type\": \"Hiç aranmamış\", \"count\": \"3\" }, { \"type\": \"Başarılı\", \"count\": 0 }, { \"type\": \"Başarısız\", \"count\": 0 }, { \"type\": \"Tekrar aranacak\", \"count\": 0 } ], \"numbers\": [ { \"numberid\": \"20xxxxxx\", \"name\": \"*** gsm\", \"call_status\": \"Tekrar aranacak\", \"no_retry_count\": \"0\", \"last_call\": null, \"unique_id\": null }, { \"numberid\": \"20xxxxxx\", \"no\": \"312911****\", \"name\": \"*** dahili\", \"call_status\": \"Tekrar aranacak\", \"no_retry_count\": \"0\", \"last_call\": null, \"unique_id\": null }, { \"numberid\": \"20xxxxxx\", \"no\": \"312911****\", \"name\": \"**** dahili\", \"call_status\": \"Tekrar aranacak\", \"no_retry_count\": \"0\", \"last_call\": null, \"unique_id\": null } ] } ] } Servisten Alınan Başarısız Örnek Cevap { \"header\": { \"error\": true, \"code\": \"30\", \"message\": \"Kullanici bilgisi bulunamadi\" }, \"body\": [] } */"
