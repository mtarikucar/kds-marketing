          - text: "{ $url= \"https://crmsntrl.netgsm.com.tr/8xxxxxxxxx/xfer?username=kullanicidiniz&password=sifreniz&exten=XXX&unique_id=xxx.xxx&crm_id=xxx\"; $ch = curl_init($url); curl_setopt($ch, CURLOPT_RETURNTRANSFER, TRUE); $http_response = curl_exec($ch); $http_code = curl_getinfo($ch, CURLINFO_HTTP_CODE); if($http_code != 200){ echo \"$http_code $http_response\\n\"; return false; } $Info = $http_response; echo \"cevap : $Info\"; return $Info; } xfer();"
