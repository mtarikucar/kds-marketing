        - generic [ref=e2780]: "$ADRESS = 'crmsntrl.netgsm.com.tr'; //Url $PORT = '9110'; //port if (($sock = socket_create(AF_INET, SOCK_STREAM, SOL_TCP)) === false) { echo \"socket_create() başarısız oldu: sebep: \" . socket_strerror(socket_last_error()) . \"\\n\"; } if (socket_connect($sock, $ADRESS, $PORT) === false) { echo \"socket_bind() başarısız oldu: sebep: \" . socket_strerror(socket_last_error($sock)) . \"\\n\"; } socket_set_option($sock, SOL_SOCKET, SO_RCVTIMEO, array(\"sec\" => 15, \"usec\" => 0)); //login işlemi. // Örnek Login İsteği // { \"command\" : \"login\", \"crm_id\" : \"XXX\", \"username\" : \"XXX\", \"password\" : \"XXX\" } $msgsock = '{ \"command\" : \"login\", \"crm_id\" : \"12345\", \"username\" : \"85030XXXXX\", \"password\" : \"XXXXX\"}'; socket_write($sock, $msgsock, strlen($msgsock)); usleep(500); $isReload = false; while ($out = socket_read($sock, 1024)) { echo $out; break; } /* Login işleminden Alınan Örnek Başarılı Cevap { \"response\" : \"login\", \"crm_id\" : \"XXX\", \"status\" : \"success\", \"message\" : \"açıklama\" } Login işleminden Alınan Örnek Başarısız Cevap { \"response\" : \"login\", \"crm_id\" : \"XXX\", \"status\" : \"error\", \"code\":\"70\", \"message\" : \"Eksik ya da yanlış parametre\"} */ exit(); //Dinamik Yönlendirme islemi.. /* Dinamik Yönlendirme İsteği İçin Örnek JSON İsteği { \"command\" : \"dynamic_redirect\", \"called\" : \"XXX\", \"redirect_menu\" : \"testnetgsm\", \"redirect_type\" : \"ivr\", \"ring_timeout\" : \"20\", \"crm_id\" : \"XXX\", \"wait_response\" : \"1\", \"trunk\" : \"XXX\" } */ $msgsock = '{ \"command\" : \"dynamic_redirect\", \"called\" : \"05051111111\", \"redirect_menu\" : \"testnetgsm\", \"redirect_type\" : \"ivr\", \"ring_timeout\" : \"20\", \"crm_id\" : \"1\", \"wait_response\" : \"1\", \"trunk\": \"85030XXXXX\" }'; socket_write($sock, $msgsock, strlen($msgsock)); usleep(500); while ($out = socket_read($sock, 2048)) { echo $out; break; }"
