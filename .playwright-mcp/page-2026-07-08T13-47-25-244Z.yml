        - generic [ref=e5055]: "if(isset($_POST['token'])) { $token = $_POST['token']; $phone = $_POST['arayan_no']; if($token == '123456' ){ try { $db = new PDO(\"mysql:host=localhost;dbname=musteriler\", \"root\", \"\"); } catch ( PDOException $e ){ print $e->getMessage(); } $query = $db->prepare(\"SELECT * FROM musteriler where telefon like ?\"); $query->execute(array('%'.ltrim($phone, '0').'%')); $member = $query->fetch(); if($member != null ){ $response = ['status'=>'success', 'result'=>'1', 'data'=>'Merhaba '.$member['ad']. ' '. $member['soyad'] ]; } else { $response = ['status'=>'success', 'result'=>'2', 'data'=>'Müşteri bulunamadı']; } } else { $response = ['status'=>'error', 'result'=>'e', 'data'=>'Sorgulamaya yetkiniz yok.']; } } else { $response = ['status'=>'error', 'result'=>'e', 'data'=>'Sorgulamaya yetkiniz yok.']; } echo json_encode($response,256);"
