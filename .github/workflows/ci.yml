name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Migrations ↔ schema parity
        run: |
          docker run -d --name pg -e POSTGRES_PASSWORD=ci -e POSTGRES_DB=shadow -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres && break; sleep 1; done
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url postgresql://postgres:ci@localhost:5432/shadow \
            --exit-code
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # build = tsc && vite build (the type check is part of the build)
      - run: npm run build
