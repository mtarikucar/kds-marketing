name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Migrations ↔ schema parity
        run: |
          docker run -d --name pg -e POSTGRES_PASSWORD=ci -e POSTGRES_DB=shadow -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres && break; sleep 1; done
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url postgresql://postgres:ci@localhost:5432/shadow \
            --exit-code
      - run: npx tsc --noEmit
      - run: npm test
      # End-to-end suite boots the real app with a mocked Prisma seam, so it
      # needs no database — runs in-band right after the unit suite.
      - run: npm run test:e2e
      - run: npm run build

  # Opt-in real-database lane: provisions Postgres + Redis service containers and
  # runs the lead-lifecycle flow (ingest → assign → convert → commission) plus the
  # Redis throttler-store integration spec against the real thing. Kept separate
  # from the fast mocked lane so a DB hiccup never blocks the core gate.
  backend-realdb:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketing
          POSTGRES_PASSWORD: marketing
          POSTGRES_DB: marketing
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U marketing"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://marketing:marketing@localhost:5432/marketing?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      # E2E_REAL_DB=1 turns on the real-DB harness (the lead-lifecycle suite);
      # the other e2e suites keep their mocked Prisma seam and run unaffected.
      - run: npm run test:e2e:realdb

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      # build = tsc && vite build (the type check is part of the build)
      - run: npm run build
