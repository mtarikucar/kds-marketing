name: Release Deploy

# Tag-driven production deploy to the shared box (38.242.233.166) — the same
# machine and pattern as the kds monorepo's release-deploy.yml, scoped to the
# marketing stack (ports 3210/3211, own postgres on 5434). The vhost flip
# that points marketing.hummytummy.com at this stack is a ONE-TIME operation
# in cutover.yml; ordinary releases just swap images behind it.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — must exist'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: marketing-production-deploy
  cancel-in-progress: false

env:
  SERVER_HOST: '38.242.233.166'
  IMAGE_BASE: ghcr.io/${{ github.repository }}
  DEPLOY_DIR: /root/kds-marketing

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm test

  build:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v7
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_BASE }}/backend:current
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/backend:buildcache,mode=max

      - name: Frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PUBLIC_API_URL || 'https://marketing.hummytummy.com/api' }}
            VITE_APP_TITLE=${{ vars.APP_TITLE || 'Marketing Console' }}
            VITE_APP_VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_BASE }}/frontend:current
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/frontend:buildcache,mode=max

  deploy:
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

      - name: Render .env.production
        env:
          VERSION: ${{ needs.version.outputs.version }}
          MARKETING_POSTGRES_PASSWORD: ${{ secrets.MARKETING_POSTGRES_PASSWORD }}
          MARKETING_JWT_SECRET: ${{ secrets.MARKETING_JWT_SECRET }}
          MARKETING_JWT_REFRESH_SECRET: ${{ secrets.MARKETING_JWT_REFRESH_SECRET }}
          PLATFORM_JWT_SECRET: ${{ secrets.PLATFORM_JWT_SECRET }}
          RESEARCH_ROUTINE_TOKEN: ${{ secrets.RESEARCH_ROUTINE_TOKEN }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          # Routine trigger layer: x-routine-token for the internal data API +
          # AES master key that seals panel-stored claude.ai trigger tokens.
          ROUTINE_TOKEN: ${{ secrets.ROUTINE_TOKEN }}
          MARKETING_SECRET_KEY: ${{ secrets.MARKETING_SECRET_KEY }}
          # Anthropic billing key. OPTIONAL: if unset, all AI features stay
          # dormant (graceful no-op) — never fails the deploy.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GHL-parity env-gated integrations. ALL OPTIONAL — unset = that
          # integration stays inert (never fails the deploy). Set the GitHub
          # secret to activate. See docs/ops/ghl-parity-setup.md.
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          STRIPE_CONNECT_CLIENT_ID: ${{ secrets.STRIPE_CONNECT_CLIENT_ID }}
          BANK_IBAN: ${{ secrets.BANK_IBAN }}
          BANK_ACCOUNT_NAME: ${{ secrets.BANK_ACCOUNT_NAME }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          # Optional: gates /api/metrics. If unset the endpoint relies on the
          # edge network restriction alone (host-nginx should not proxy it).
          METRICS_SCRAPE_TOKEN: ${{ secrets.METRICS_SCRAPE_TOKEN }}
          # NetGSM click-to-dial sales line (telephony only, optional). NOTE: the
          # NetGSM *SMS* credentials (usercode/password/msgheader) are NOT env vars —
          # they live per-channel, sealed in the DB (set via Channels settings UI).
          NETGSM_SALES_LINE: ${{ secrets.NETGSM_SALES_LINE }}
        run: |
          set -euo pipefail
          required=(MARKETING_POSTGRES_PASSWORD MARKETING_JWT_SECRET
                    MARKETING_JWT_REFRESH_SECRET PLATFORM_JWT_SECRET
                    RESEARCH_ROUTINE_TOKEN INTERNAL_SERVICE_TOKEN)
          missing=0
          for k in "${required[@]}"; do
            [ -n "${!k:-}" ] || { echo "::error::secret $k is missing"; missing=1; }
          done
          [ "$missing" -eq 0 ]

          # PSP + email values that must MATCH core's live config are read on
          # the server from /root/kds-marketing/.env.shared (extracted from
          # core's .env.production by the bootstrap workflow) and appended
          # below — they never transit the runner.
          cat > .env.rendered <<ENV
          # ── rendered by deploy.yml for ${VERSION} ──
          NODE_ENV=production
          PORT=3000
          IMAGE_TAG=${VERSION}
          DATABASE_URL=postgresql://marketing:${MARKETING_POSTGRES_PASSWORD}@postgres:5432/marketing?schema=public
          MARKETING_POSTGRES_PASSWORD=${MARKETING_POSTGRES_PASSWORD}
          # Distributed rate-limit store (the redis service in docker-compose.prod.yml).
          REDIS_URL=redis://redis:6379
          MARKETING_JWT_SECRET=${MARKETING_JWT_SECRET}
          MARKETING_JWT_REFRESH_SECRET=${MARKETING_JWT_REFRESH_SECRET}
          PLATFORM_JWT_SECRET=${PLATFORM_JWT_SECRET}
          RESEARCH_ROUTINE_TOKEN=${RESEARCH_ROUTINE_TOKEN}
          INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
          ROUTINE_TOKEN=${ROUTINE_TOKEN}
          MARKETING_SECRET_KEY=${MARKETING_SECRET_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          # GHL-parity integrations (optional; empty = inert).
          GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
          GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
          META_APP_ID=${META_APP_ID}
          META_APP_SECRET=${META_APP_SECRET}
          LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
          LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
          STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID}
          MARKETING_PUBLIC_URL=https://marketing.hummytummy.com
          # Public origin for callback/tracking links the API emits (NetGSM MO
          # callbackUrl, campaign tracking, Twilio voice signature). Without it the
          # SMS channel's MO URL renders null and the operator can't wire NetGSM.
          PUBLIC_BASE_URL=https://marketing.hummytummy.com
          CORE_SERVICE_URL=http://host.docker.internal:3000
          CORS_ORIGIN=https://marketing.hummytummy.com
          FRONTEND_URL=https://marketing.hummytummy.com
          APP_NAME=HummyTummy
          APP_URL=https://hummytummy.com
          BANK_IBAN=${BANK_IBAN}
          BANK_ACCOUNT_NAME=${BANK_ACCOUNT_NAME}
          PAYTR_TEST_MODE=0
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          METRICS_SCRAPE_TOKEN=${METRICS_SCRAPE_TOKEN}
          # NetGSM click-to-dial sales line (telephony only; empty = inert). SMS
          # creds are per-channel in the DB, not here.
          NETGSM_SALES_LINE=${NETGSM_SALES_LINE}
          ENV

      - name: Ship env + compose (atomic)
        run: |
          set -euo pipefail
          scp -o ServerAliveInterval=15 .env.rendered \
            root@${{ env.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/.env.rendered.new
          scp -o ServerAliveInterval=15 docker-compose.prod.yml \
            root@${{ env.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/docker-compose.prod.yml.new
          ssh root@${{ env.SERVER_HOST }} "
            set -euo pipefail
            cd ${{ env.DEPLOY_DIR }}
            # Final env = rendered part + shared (PSP/email) part from core.
            cat .env.rendered.new > .env.production.new
            if [ -f .env.shared ]; then cat .env.shared >> .env.production.new; fi
            rm .env.rendered.new
            chmod 600 .env.production.new
            mv .env.production.new .env.production
            cp .env.production .env   # compose interpolation reads ./.env
            mv docker-compose.prod.yml.new docker-compose.prod.yml
          "

      - name: Pull + swap + health-gate
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} "
            set -euo pipefail
            cd ${{ env.DEPLOY_DIR }}
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USER}' --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo 'waiting for API health on :3211 ...'
            for i in \$(seq 1 30); do
              code=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                http://localhost:3211/api/marketing/billing/packages || true)
              if [ \"\$code\" = '200' ]; then
                echo \"API healthy (attempt \$i)\"
                exit 0
              fi
              sleep 5
            done
            echo '::error::API did not become healthy — recent backend logs:'
            docker logs --tail 80 kds_marketing_api || true
            exit 1
          "

      - name: Disk cleanup
        if: success()
        run: |
          ssh root@${{ env.SERVER_HOST }} \
            'docker image prune -af --filter "until=168h" >/dev/null 2>&1 || true'
