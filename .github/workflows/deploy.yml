name: Build & Deploy

# Images are built/pushed on every main push; the SSH deploy step only runs
# when the repo variable DEPLOY_ENABLED is "true" AND the SSH secrets exist
# (set them in Settings → Secrets/Variables → Actions):
#   vars:    DEPLOY_ENABLED, DEPLOY_HOST, DEPLOY_PATH
#   secrets: DEPLOY_SSH_KEY, DEPLOY_USER
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PUBLIC_API_URL || 'http://localhost:3100/api' }}
            VITE_APP_TITLE=${{ vars.APP_TITLE || 'Marketing Console' }}
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    needs: images
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (compose pull + up, migrations run on boot)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            docker compose pull backend frontend
            docker compose up -d backend frontend
            docker compose ps
